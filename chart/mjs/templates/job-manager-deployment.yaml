# Copyright 2025 The MathWorks, Inc.
{{- $name := include "resources.jobManager" . }}
{{- $jobManagerImageTag := .Values.jobManagerImageTag | default .Values.matlabRelease }}
{{- $jobManagerImage := .Values.jobManagerImage }}
{{- if and .Values.jobManagerUsesPVC (not (empty .Values.matlabPVC)) }}
    {{/* If we're mounting MATLAB from a PVC, use the matlab-deps image */}}
    {{- $jobManagerImage = .Values.matlabDepsImage }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  selector:
    matchLabels:
      app: {{ $name }}
  replicas: 1
  strategy:
    type: Recreate # Kill previous job manager before creating a new one
  template:
    metadata:
      labels:
        app: {{ $name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/job-manager-configmap.yaml") . | sha256sum }} # Restart pod if config map changes

    spec:
      # Ensure this pod can resolve its own hostname
      hostAliases:
      - ip: "127.0.0.1"
        hostnames:
        - {{ $name | quote }}

      # If set to false, disable creation of environment variables for services
      enableServiceLinks: {{ include "derived.enableServiceLinks" . }}

      # Set selector and tolerations
      nodeSelector: {{ toJson .Values.jobManagerNodeSelector }}
      tolerations: {{ toJson .Values.jobManagerTolerations }}

      # Set user to run as
      securityContext:
        runAsUser: {{ .Values.jobManagerUserID }}
        runAsGroup: {{ .Values.jobManagerGroupID }}
        fsGroup: {{ .Values.jobManagerGroupID }}

      containers:
      - name: {{ $name }}
        image: {{ printf "%s:%s" $jobManagerImage $jobManagerImageTag }}
        imagePullPolicy: {{ .Values.jobManagerImagePullPolicy }}
        command:
        - "/bin/bash"
        - {{ printf "%s/jobManager.sh" (include "paths.configDir" .)  | quote }}

        env:
        {{- if ge (int .Values.securityLevel) 2 }}
        # Get admin password from secret
        - name: PARALLEL_SERVER_JOBMANAGER_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "resources.adminPasswordSecret" . }}
              key: {{ include "resources.adminPasswordKey" . }}
        {{- end }}
        {{- if .Values.javaPVC }}
        - name: MJS_JAVA
          value: {{ include "paths.javaDir" . }}
        {{- end }}
        {{- range $key, $value := (.Values.extraJobManagerEnv | default dict) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}

        # Set optional resource requests and limits
        resources:
          requests:
            {{- if .Values.jobManagerCPURequest }}
            cpu: {{ .Values.jobManagerCPURequest }}
            {{- end }}
            {{- if .Values.jobManagerMemoryRequest }}
            memory: {{ .Values.jobManagerMemoryRequest }}
            {{- end }}
          limits:
            {{- if .Values.jobManagerCPULimit }}
            cpu: {{ .Values.jobManagerCPULimit }}
            {{- end }}
            {{- if .Values.jobManagerMemoryLimit }}
            memory: {{ .Values.jobManagerMemoryLimit }}
            {{- end }}

        # Run healthcheck in startup and liveness probes
        {{- $healthcheckExe := printf "%s/glnxa64/mjshealthcheck" (include "paths.binDir" .) }}
        {{- $probeTimeout := .Values.livenessProbeTimeout | default 30 }}
        {{- $livenessProbePeriod := .Values.livenessProbePeriod | default 300 }}
        startupProbe:
          exec:
            command:
            - {{ $healthcheckExe | quote }}
            - "-jobmanager"
            - {{ .Values.jobManagerName | quote }}
            - "-matlabroot"
            - {{ include "paths.matlabroot" . | quote }}
            - "-baseport"
            - {{ .Values.basePort | quote }}
            - "-timeout"
            - {{ $probeTimeout | quote }}
          initialDelaySeconds: {{ .Values.startupProbeInitialDelay | default 5 }} 
          periodSeconds: {{ .Values.startupProbePeriod | default 1 }}
          timeoutSeconds: {{ $probeTimeout }}
          failureThreshold: {{ .Values.startupProbeFailureThreshold | default 60 }}
        livenessProbe:
          exec:
            command:
            - {{ $healthcheckExe  | quote }}
            - "-jobmanager"
            - {{ .Values.jobManagerName | quote }}
            - "-matlabroot"
            - {{ include "paths.matlabroot" . | quote }}
            - "-baseport"
            - {{ .Values.basePort | quote }}
            - "-timeout"
            - {{ $probeTimeout | quote }}
          initialDelaySeconds: {{ $livenessProbePeriod }} 
          periodSeconds: {{ $livenessProbePeriod }}
          timeoutSeconds: {{ $probeTimeout }}
          failureThreshold: {{ .Values.livenessProbeFailureThreshold | default 3 }}

        # Stop the job manager cleanly when the container stops
        lifecycle:
          preStop:
            exec:   
              command:
              - "/bin/bash"
              - {{ printf "%s/stopJobManager.sh" (include "paths.configDir" .)  | quote }}

        volumeMounts:
        {{- $configVolName := "config-vol" }}
        {{- $logVolName := "log-vol" }}
        {{- $matlabVolName := "matlab-vol" }}
        {{- $checkpointVolName := "checkpoint-vol" }}
        {{- $secretVolName := include "resources.sharedSecretVol" . }}
        {{- $ldapVolName := "ldap-cert-vol" }}
        {{- $metricsVolName := "metrics-cert-vol" }}
        {{- $javaVolName := "java-vol" }}
        - name: {{ $configVolName }}
          mountPath: {{ include "paths.configDir" . }}
        {{- if .Values.logPVC }}
        - name: {{ $logVolName }}
          mountPath: {{ include "paths.logbase" . }}
        {{- end }}
        {{- if and .Values.matlabPVC .Values.jobManagerUsesPVC }}
        - name: {{ $matlabVolName }}
          mountPath: {{ include "paths.matlabroot" . }}
          readOnly: true
        {{- end }}
        {{- if .Values.checkpointPVC }}
        - name: {{ $checkpointVolName }}
          mountPath: {{ include "paths.databasedir" . }}
        {{- end }}
        {{- if eq (include "derived.requiresSecret" .) "true" }}
        - name: {{ $secretVolName }}
          mountPath: {{ include "paths.secretDir" . }}
          readOnly: true
        {{- end }}
        {{- if eq (include "derived.addLDAPCert" .) "true" }}
        - name: {{ $ldapVolName }}
          mountPath: {{ include "paths.ldapCertDir" . }}
        {{- end }}
        {{- if and .Values.exportMetrics .Values.useSecureMetrics }}
        - name: {{ $metricsVolName }}
          mountPath: {{ include "paths.metricsCertDir" . }}
        {{- end }}
        {{- if .Values.javaPVC }}
        - name: {{ $javaVolName }}
          mountPath: {{ include "paths.javaDir" . }}
        {{- end }}

      volumes:
      - name: {{ $configVolName }}
        configMap:
          name: {{ include "resources.jobManagerConfigMap" . }}
      {{- if .Values.logPVC }}
      - name: {{ $logVolName }}
        persistentVolumeClaim:
          claimName: {{ .Values.logPVC }}
      {{- end }}
      {{- if and .Values.matlabPVC .Values.jobManagerUsesPVC }}
      - name: {{ $matlabVolName }}
        persistentVolumeClaim:
          claimName: {{ .Values.matlabPVC }}
      {{- end }}
      {{- if .Values.checkpointPVC }}
      - name: {{ $checkpointVolName }}
        persistentVolumeClaim:
          claimName: {{ .Values.checkpointPVC }}
      {{- end }}
      {{- if eq (include "derived.requiresSecret" .) "true" }}
      - name: {{ $secretVolName }}
        secret:
          secretName: {{ include "resources.sharedSecret" . }}
      {{- end }}
      {{- if eq (include "derived.addLDAPCert" .) "true" }}
      - name: {{ $ldapVolName }}
        secret:
          secretName: {{ include "resources.ldapSecret" . }}
      {{- end }}
      {{- if and .Values.exportMetrics .Values.useSecureMetrics }}
      - name: {{ $metricsVolName }}
        secret:
          secretName: {{ include "resources.metricsSecret" . }}
      {{- end }}
      {{- if .Values.javaPVC }}
      - name: {{ $javaVolName }}
        persistentVolumeClaim:
          claimName: {{ .Values.javaPVC }}
      {{- end }}