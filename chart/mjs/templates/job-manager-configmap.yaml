{{- $localMJSDef := "/tmp/mjs_def.sh" }}
{{- $startFile := "/tmp/jm-started" }}
{{- $stopFile := "/tmp/jm-stopped" }}
{{- $scriptLogFile := printf "%s/script-log.log" (include "paths.logbase" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "resources.jobManagerConfigMap" . }}
data:
  mjs_def.sh: |
    # Common mjs_def.sh file for the job manager and workers
    BASE_PORT={{ .Values.basePort }}
    MAX_LINUX_WORKERS={{ .Values.maxWorkers }}
    CHECKPOINTBASE={{ include "paths.checkpointbase" . }}
    PIDBASE=/tmp/pid
    USE_SECURE_COMMUNICATION={{ .Values.useSecureCommunication }}
    REQUIRE_CLIENT_CERTIFICATE={{ .Values.requireClientCertificate }}
    REQUIRE_SCRIPT_VERIFICATION={{ .Values.requireScriptVerification }}
    SECURITY_LEVEL={{ .Values.securityLevel }}
    SHARED_SECRET_FILE={{ include "paths.secretPath" . }}
    USE_ONLINE_LICENSING={{ .Values.useOnlineLicensing }}
    ADMIN_USER={{ .Values.adminUser }}
    {{- if .Values.ldapURL }}
    USE_LDAP_SERVER_AUTHENTICATION=true
    LDAP_URL={{ .Values.ldapURL | quote }}
    LDAP_SECURITY_PRINCIPAL_FORMAT={{ .Values.ldapSecurityPrincipalFormat | quote }}
    LDAP_SYNCHRONIZATION_INTERVAL_SECS={{ .Values.ldapSynchronizationIntervalSecs | quote }}
    {{- end }}
    EXPORT_METRICS={{ .Values.exportMetrics }}
    METRICS_PORT={{ .Values.metricsPort }}
    USE_SECURE_METRICS={{ .Values.useSecureMetrics }}
    {{- if .Values.useSecureMetrics }}
    METRICS_CA_FILE={{ include "paths.metricsCertDir" . }}/{{ include "paths.metricsCaCert" . }}
    METRICS_CERT_FILE={{ include "paths.metricsCertDir" . }}/{{ include "paths.metricsCert" . }}
    METRICS_KEY_FILE={{ include "paths.metricsCertDir" . }}/{{ include "paths.metricsKey" . }}
    {{- end }}
    {{- if .Values.javaPVC }}
    MJS_JAVA={{ include "paths.javaDir" . }}
    {{- end }}
    {{- if (ge .Values.matlabRelease "r2026a") }}
    MJS_ADDITIONAL_SUPPORTED_RELEASES={{ .Values.additionalSupportedReleases | join "," | replace "r" "R" }}
    {{- end }}

  jobManager.sh: |
    #!/usr/bin/env bash
    # Script to run on the MATLAB Job Scheduler job manager pod
    set -euo pipefail

    # Set ulimit to a reasonable value
    ulimit -n {{ .Values.fileDescriptorUlimit | default 4096 }}

{{ include "scripts.setMatlabRoot" . | indent 4 }}

    # Set up the mjs_def file
    cp {{ printf "%s/mjs_def.sh" (include "paths.configDir" .) }} {{ $localMJSDef }}
    echo "HOSTNAME={{ include "resources.jobManager" . }}" >> {{ $localMJSDef }}
    echo "LOGBASE={{ include "paths.logbase" . }}" >> {{ $localMJSDef }}

    {{ if eq (include "derived.addLDAPCert" .) "true" -}}
    # Add LDAP certificate to the Java trust store
    TRUSTSTORE_PATH="${MATLAB_ROOT}/sys/java/jre/glnxa64/jre/lib/security/cacerts"
    chmod +w "${TRUSTSTORE_PATH}"
    yes | "${MATLAB_ROOT}/sys/java/jre/glnxa64/jre/bin/keytool" -import -keystore "${TRUSTSTORE_PATH}" -file {{ include "paths.ldapCert" . }} -storepass changeit > /dev/null
    {{ end -}}

    # Start the MJS service
    ${BIN_DIR}/mjs start -mjsdef {{ $localMJSDef }} -loglevel {{ .Values.logLevel }} -disablereliableconnections 2>&1 | tee -a {{ $scriptLogFile }}

    # Start the job manager
    JM_CMD="${BIN_DIR}/startjobmanager -name \"{{ .Values.jobManagerName }}\" -baseport {{ .Values.basePort | int }} -databaseDirectory {{ include "paths.databasedir" . }}/{{ .Values.matlabRelease }} -scriptlogfile {{ $scriptLogFile }}"
    {{- if .Values.requireClientCertificate }}
    JM_CMD="${JM_CMD} -certificate \"{{ include "paths.certPath" . }}\""
    {{- end }}
    {{- if .Values.requireScriptVerification }}
    JM_CMD="${JM_CMD} -secretfile \"{{ include "paths.secretPath" . }}\""
    {{- end }}
    echo "$(date) | Running startjobmanager command: ${JM_CMD}" | tee -a {{ $scriptLogFile }}
    eval ${JM_CMD} 2>&1 | tee -a {{ $scriptLogFile }}

    # Add a file to indicate that startjobmanager is complete
    touch {{ $startFile }}

    # Keep the container running
    echo "$(date) | Started job manager. Will keep container running until stop file appears." | tee -a {{ $scriptLogFile }}
    while [ ! -f {{ $stopFile | quote }} ]; do
      sleep 1
    done

  stopJobManager.sh: |
    #!/usr/bin/env bash
    # Script to gracefully shut down the job manager
    set -euo pipefail

    # First, wait for startjobmanager to have finished successfully
    echo "$(date) | Waiting for startjobmanager to finish before cleanly stopping job manager." | tee -a {{ $scriptLogFile }}
    while [ ! -f {{ $startFile | quote }} ]; do
      sleep 1
    done

    # Read the MATLAB root directory determined by the startup script
    MATLAB_ROOT=$(cat {{ include "paths.matlabRootFile" . }})
    BIN_DIR="${MATLAB_ROOT}/toolbox/parallel/bin"

    # Stop the job manager
    STOP_CMD="${BIN_DIR}/stopjobmanager -cleanPreserveJobs -name '{{ .Values.jobManagerName }}' -baseport {{ .Values.basePort | int }} -scriptlogfile {{ $scriptLogFile }}"
    {{- if .Values.requireScriptVerification }}
    STOP_CMD="${STOP_CMD} -secretfile \"{{ include "paths.secretPath" . }}\""
    {{- end }}
    eval ${STOP_CMD} 2>&1 | tee -a {{ $scriptLogFile }}

    # Trigger the container to exit
    echo "$(date) | Stopped job manager. Touching stop file so main container process can exit." | tee -a {{ $scriptLogFile }}
    touch {{ $stopFile }}
