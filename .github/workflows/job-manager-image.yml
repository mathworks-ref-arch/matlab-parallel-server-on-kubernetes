# Copyright 2024 The MathWorks, Inc.
name: Build MATLAB Parallel Server job-manager image

# Trigger this workflow either manually or when a new change is pushed to the
# repo (except .md files)
on:
  workflow_dispatch:
  push:
    # Trigger the workflow if image files or this workflow file are changed
    branches:
      - actions
    paths:
      - "images/job-manager/**"
      - ".github/workflows/parallel-server-images.yml"
  #schedule:
    # Run at 00:00 on every Monday (1st Day of the Week)
    #- cron: "0 0 * * 1"

env:
  LICENSE_FILE_PATH: ${{ github.workspace }}/license.lic

jobs:
  build-push-job-manager-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        matlab-release: [r2024a]

    env:
      IMAGE_BASE_NAME: ghcr.io/mathworks-ref-arch/matlab-parallel-server-k8s/mjs-job-manager-image

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally
        uses: docker/build-push-action@v3
        with:
          platforms: linux/amd64
          context: ./images/job-manager
          build-args: MATLAB_RELEASE=${{ matrix.matlab-release }}
          tags: ${{ env.IMAGE_BASE_NAME }}:${{ matrix.matlab-release }}

      - name: Generate MATLAB license file
        run: echo '${{ secrets.MATLAB_LICENSE_FILE_R2024A }}' > ${{ env.LICENSE_FILE_PATH }}

      - name: Test MJS on container
        env:
          BIN_DIR: /opt/matlab/toolbox/parallel/bin
        run: docker run ${IMAGE_BASE_NAME}:${{ matrix.matlab-release }} bash -c "${BIN_DIR}/mjs start && ${BIN_DIR}/startjobmanager && ${BIN_DIR}/glnxa64/mjshealthcheck -matlabroot /opt/matlab"

      - name: Test MATLAB on container
        env:
          MLM_LICENSE_FILE: /tmp/license.lic
        run: docker run -v ${LICENSE_FILE_PATH}:${MLM_LICENSE_FILE} ${IMAGE_BASE_NAME}:${{ matrix.matlab-release }} bash -c "cat ${MLM_LICENSE_FILE} && MLM_LICENSE_FILE=${MLM_LICENSE_FILE} /opt/matlab/bin/matlab -batch 'version'"

      - name: Push the image to ghcr.io
        run: docker push ${IMAGE_BASE_NAME}:${{ matrix.matlab-release }}
